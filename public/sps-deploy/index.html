<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>SPS Deploy</title>
<meta name="description" content="SPS deployment crew tracker — check-ins, contacts, 214/DTR paperwork. Works offline.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1419">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SPS Deploy">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
:root{
  --bg:#0f1419; --card:#1a222c; --card2:#212b37; --line:#2d3946;
  --text:#e8edf2; --dim:#8fa0b0; --accent:#ff7a1a; --green:#2ecc71;
  --red:#ff5252; --amber:#ffc94d; --blue:#4dabff;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  font-size:16px; overscroll-behavior-y:none;}
body{padding-bottom:calc(70px + env(safe-area-inset-bottom));}
header{position:sticky; top:0; z-index:20; background:rgba(15,20,25,.96);
  backdrop-filter:blur(8px); border-bottom:1px solid var(--line);
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px; display:flex; align-items:center; gap:10px;}
header h1{font-size:18px; margin:0; font-weight:700; letter-spacing:.3px; flex:1;}
header h1 span{color:var(--accent);}
.hbtn{background:none; border:none; color:var(--dim); font-size:22px; padding:6px 8px; cursor:pointer;}
main{padding:14px 14px 20px; max-width:640px; margin:0 auto;}
h2{font-size:13px; text-transform:uppercase; letter-spacing:1px; color:var(--dim); margin:22px 0 10px;}
h2:first-child{margin-top:4px;}
.card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:10px;}
.banner{border-radius:14px; padding:14px 16px; margin-bottom:14px; font-weight:600; display:flex; align-items:center; gap:10px;}
.banner .big{font-size:20px;}
.banner.ok{background:#15301f; border:1px solid #2ecc7144; color:#a9e8c3;}
.banner.due{background:#3a1414; border:1px solid #ff525266; color:#ffb3b3; animation:pulse 1.6s infinite;}
.banner.soon{background:#332708; border:1px solid #ffc94d55; color:#ffe0a3;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.72}}
button.primary{width:100%; background:var(--accent); color:#1a0f00; border:none; border-radius:12px;
  padding:15px; font-size:17px; font-weight:700; cursor:pointer;}
button.secondary{width:100%; background:var(--card2); color:var(--text); border:1px solid var(--line);
  border-radius:12px; padding:13px; font-size:15px; font-weight:600; cursor:pointer;}
button:active{transform:scale(.985);}
.row{display:flex; gap:10px;}
.row>*{flex:1;}
.crewline{display:flex; align-items:center; gap:12px; padding:13px 14px; background:var(--card);
  border:1px solid var(--line); border-radius:14px; margin-bottom:8px; cursor:pointer;}
.crewline .cs{background:var(--card2); border:1px solid var(--line); color:var(--accent); font-weight:700;
  padding:6px 10px; border-radius:9px; font-size:14px; min-width:52px; text-align:center; flex-shrink:0;}
.crewline .nm{flex:1; min-width:0;}
.crewline .nm b{display:block; font-size:16px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.crewline .nm small{color:var(--dim); font-size:13px;}
.chev{color:var(--dim); font-size:18px; flex-shrink:0;}
.checkrow{display:flex; align-items:center; gap:10px; padding:11px 12px; border-bottom:1px solid var(--line);}
.checkrow:last-child{border-bottom:none;}
.checkrow .who{flex:1; min-width:0;}
.checkrow .who b{font-size:16px;}
.checkrow .who small{color:var(--dim); display:block; font-size:12.5px;}
.ckbtn{border:2px solid var(--line); background:var(--card2); color:var(--text); border-radius:11px;
  padding:11px 16px; font-size:15px; font-weight:700; cursor:pointer; min-width:96px;}
.ckbtn.done{background:#15301f; border-color:var(--green); color:var(--green);}
.ckbtn.missed{background:#3a1414; border-color:var(--red); color:var(--red);}
.miss{background:none; border:none; color:var(--dim); font-size:12px; padding:6px; cursor:pointer; text-decoration:underline;}
.pill{display:inline-block; font-size:12px; font-weight:700; padding:3px 9px; border-radius:20px;}
.pill.g{background:#15301f; color:var(--green);}
.pill.r{background:#3a1414; color:var(--red);}
.pill.a{background:#332708; color:var(--amber);}
input,textarea,select{width:100%; background:var(--card2); border:1px solid var(--line); color:var(--text);
  border-radius:10px; padding:12px; font-size:16px; font-family:inherit;}
input:focus,textarea:focus{outline:none; border-color:var(--accent);}
label{display:block; font-size:12.5px; color:var(--dim); margin:12px 0 5px; font-weight:600; text-transform:uppercase; letter-spacing:.5px;}
label:first-child{margin-top:0;}
nav{position:fixed; bottom:0; left:0; right:0; z-index:20; display:flex; background:rgba(15,20,25,.97);
  backdrop-filter:blur(8px); border-top:1px solid var(--line); padding-bottom:env(safe-area-inset-bottom);}
nav button{flex:1; background:none; border:none; color:var(--dim); padding:9px 0 7px; font-size:11px;
  font-weight:600; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:2px;}
nav button .ic{font-size:21px;}
nav button.on{color:var(--accent);}
.modal-bg{position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:50; display:flex;
  align-items:flex-end; justify-content:center;}
.modal{background:var(--card); border:1px solid var(--line); border-radius:18px 18px 0 0; width:100%;
  max-width:640px; max-height:88vh; overflow-y:auto; padding:20px 18px calc(24px + env(safe-area-inset-bottom));}
.modal h3{margin:0 0 14px; font-size:18px;}
.memberline{display:flex; align-items:center; gap:10px; padding:11px 0; border-bottom:1px solid var(--line);}
.memberline:last-child{border-bottom:none;}
.memberline .mi{flex:1; min-width:0;}
.memberline .mi b{font-size:15.5px;}
.memberline .mi small{color:var(--dim); display:block; font-size:12.5px;}
.callbtn{background:#15301f; border:1px solid #2ecc7144; color:var(--green); border-radius:10px;
  padding:9px 13px; font-size:14px; text-decoration:none; font-weight:700; flex-shrink:0;}
.editbtn{background:var(--card2); border:1px solid var(--line); color:var(--dim); border-radius:10px;
  padding:9px 11px; font-size:14px; cursor:pointer; flex-shrink:0;}
.paperrow{display:flex; align-items:center; gap:8px; padding:11px 12px; border-bottom:1px solid var(--line);}
.paperrow:last-child{border-bottom:none;}
.paperrow .who{flex:1; min-width:0;}
.pbtn{border:2px solid var(--line); background:var(--card2); color:var(--dim); border-radius:10px;
  padding:9px 6px; font-size:12.5px; font-weight:700; cursor:pointer; width:86px; text-align:center; line-height:1.25;}
.pbtn.got{background:#15301f; border-color:var(--green); color:var(--green);}
.datenav{display:flex; align-items:center; gap:8px; margin-bottom:12px;}
.datenav button{background:var(--card2); border:1px solid var(--line); color:var(--text); border-radius:10px;
  padding:10px 16px; font-size:17px; cursor:pointer;}
.datenav .d{flex:1; text-align:center; font-weight:700; font-size:16px;}
.datenav .d small{display:block; color:var(--dim); font-weight:400; font-size:12px;}
.empty{text-align:center; color:var(--dim); padding:28px 16px; font-size:14.5px; line-height:1.5;}
.logday{margin-bottom:6px;}
.logline{display:flex; gap:10px; padding:8px 12px; font-size:14px; border-bottom:1px solid var(--line);}
.logline:last-child{border-bottom:none;}
.logline .t{color:var(--accent); font-weight:700; min-width:48px; font-variant-numeric:tabular-nums;}
.muted{color:var(--dim); font-size:13px;}
.back{background:none; border:none; color:var(--blue); font-size:16px; padding:0 0 12px; cursor:pointer; font-weight:600;}
.danger{color:var(--red) !important; border-color:#ff525244 !important;}
.tcphoto{width:100%; border-radius:12px; border:1px solid var(--line); margin-bottom:10px;}
.spin{display:inline-block; width:18px; height:18px; border:3px solid var(--line); border-top-color:var(--accent);
  border-radius:50%; animation:sp 0.8s linear infinite; vertical-align:-4px;}
@keyframes sp{to{transform:rotate(360deg)}}
.notice{font-size:13px; color:var(--dim); line-height:1.45; margin-top:10px;}
.offline-dot{width:8px; height:8px; border-radius:50%; background:var(--red); display:none;}
body.offline .offline-dot{display:block;}
.firepill{background:#33200a; border:1.5px solid var(--accent); color:var(--accent); font-weight:800;
  font-size:14px; padding:6px 12px; border-radius:20px; cursor:pointer; letter-spacing:.5px; flex-shrink:0;
  max-width:46vw; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.suggest{margin-top:2px;}
.sgrow{background:var(--card2); border:1px solid var(--line); padding:10px 12px; cursor:pointer; font-size:14.5px; margin-top:-1px;}
.sgrow:first-child{border-radius:10px 10px 0 0; margin-top:0;}
.sgrow:last-child{border-radius:0 0 10px 10px;}
.sgrow:only-child{border-radius:10px;}
.sgrow b{color:var(--accent);}
.sgrow small{display:block; color:var(--dim); font-size:12px; margin-top:2px;}
.sgrow:active{background:var(--line);}
.firechip{display:flex; align-items:center; gap:10px; width:100%; background:var(--card2); border:2px solid var(--line);
  color:var(--text); border-radius:11px; padding:12px 14px; font-size:16px; font-weight:700; cursor:pointer; margin-bottom:8px; text-align:left;}
.firechip.cur{border-color:var(--accent); color:var(--accent);}
.firechip small{margin-left:auto; font-weight:600; color:var(--dim); font-size:12px;}
</style>
</head>
<body>
<header>
  <h1><span>SPS</span> DEPLOY</h1>
  <button class="firepill" id="firepill" onclick="A.incidentModal()">SET FIRE #</button>
  <div class="offline-dot" title="Offline"></div>
  <button class="hbtn" onclick="A.go('settings')">⚙︎</button>
</header>
<main id="view"></main>
<nav id="nav"></nav>
<input type="file" id="tcfile" accept="image/*" capture="environment" style="display:none">
<input type="file" id="importfile" accept=".json,application/json" style="display:none">
<div id="modalhost"></div>

<script>
'use strict';
/* ============ state ============ */
const KEY='sps-deploy-v1';
const blank = () => ({crews:[], rounds:[], paperwork:{}, leaders:[], directory:[], incident:null, nocontact:[],
  settings:{intervalMin:120, firstTime:'08:00', retryMin:5, apiKey:'', myName:'', share:null}});
let S = blank();
try{ const raw = localStorage.getItem(KEY); if(raw){
  const p = JSON.parse(raw);
  S = Object.assign(blank(), p);
  S.settings = Object.assign(blank().settings, p.settings || {});
  S.leaders = p.leaders || []; S.directory = p.directory || []; S.incident = p.incident || null;
  S.nocontact = p.nocontact || [];
  if(S.incident){ // migrate: fires were plain number strings, now {num, name}; incident gained number
    S.incident.number = S.incident.number || '';
    S.incident.fires = (S.incident.fires || []).map(f => typeof f === 'string' ? {num:f, name:''} : f);
  }
} }catch(e){}
const save = () => { try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){ alert('Storage full — export a backup and remove old T-Card photos.'); } schedulePush(); };
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const esc = s => String(s??'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const now = () => new Date().toISOString();
const fmtT = iso => iso ? new Date(iso).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false}) : '';
const dayKey = d => { const x = d ? new Date(d) : new Date(); return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0'); };
const fmtDay = k => { const [y,m,d] = k.split('-').map(Number); return new Date(y,m-1,d).toLocaleDateString([], {weekday:'short', month:'short', day:'numeric'}); };
const activeCrews = () => S.crews.filter(c => !c.archived);
const crewById = id => S.crews.find(c => c.id === id);
const openRound = () => S.rounds.find(r => !r.closedAt);

/* ============ routing ============ */
const A = {};
let route = {tab:'home'};
let paperDay = dayKey();
A.go = (tab, crewId) => { route = {tab, crewId}; render(); window.scrollTo(0,0); };

const TABS = [
  ['home','⏱','Check-In'], ['crews','👥','Crews'], ['paper','📋','Paperwork'], ['log','🗒','Log']
];
function renderNav(){
  document.getElementById('nav').innerHTML = TABS.map(([id,ic,lb]) =>
    `<button class="${route.tab===id||(route.tab==='crew'&&id==='crews')?'on':''}" onclick="A.go('${id}')"><span class="ic">${ic}</span>${lb}</button>`).join('');
}

/* ============ incident / fire number ============ */
const INC_TYPES = {single:'Single fire', complex:'Complex', mzoc:'MZOC'};
function firePillText(){
  if(!S.incident) return 'SET FIRE #';
  return S.incident.current || S.incident.name || 'SET FIRE #';
}
A.setupIncident = (firstRun) => {
  const inc = S.incident || {type:'single', name:'', number:'', fires:[], current:''};
  const curFire = inc.fires.find(f => f.num === inc.current) || {num:inc.current||'', name:''};
  modal(`<h3>${firstRun ? 'New deployment' : 'Deployment details'}</h3>
    <label>Incident type</label>
    <select id="i_type" onchange="document.getElementById('i_namewrap').style.display = this.value==='single' ? 'none' : 'block'">
      ${Object.entries(INC_TYPES).map(([v,l]) => `<option value="${v}" ${inc.type===v?'selected':''}>${l}</option>`).join('')}
    </select>
    <div id="i_namewrap" style="display:${inc.type==='single'?'none':'block'}">
      <div class="row">
        <div style="flex:1.6"><label>Complex / MZOC name</label>
          <input id="i_name" value="${esc(inc.name||'')}" placeholder="e.g. Grouse Complex"></div>
        <div><label>Number</label>
          <input id="i_num" value="${esc(inc.number||'')}" placeholder="e.g. K50000" autocapitalize="characters" style="text-transform:uppercase"></div>
      </div>
    </div>
    <div class="row">
      <div><label>Fire number you're working</label>
        <input id="i_fire" value="${esc(curFire.num)}" placeholder="e.g. K71058" autocapitalize="characters" style="text-transform:uppercase" oninput="A.fireSuggest(this,'i_firename')" autocomplete="off"></div>
      <div style="flex:1.4"><label>Fire name</label>
        <input id="i_firename" value="${esc(curFire.name)}" placeholder="auto-fills from BCWS map"></div>
    </div>
    <div id="sg_i_fire" class="suggest"></div>
    <div class="row" style="margin-top:16px">
      ${firstRun ? `<button class="secondary" onclick="A.closeModal()">Later</button>` : `<button class="secondary" onclick="A.closeModal()">Cancel</button>`}
      <button class="primary" onclick="A.saveIncident()">${firstRun ? 'Start deployment' : 'Save'}</button>
    </div>`);
};
A.saveIncident = () => {
  const g = x => document.getElementById(x).value.trim();
  const type = g('i_type'), fireNum = g('i_fire').toUpperCase(), fireName = g('i_firename');
  if(!fireNum){ alert('Fire number is required'); return; }
  const inc = S.incident || {fires:[]};
  inc.type = type;
  inc.name = type === 'single' ? '' : g('i_name');
  inc.number = type === 'single' ? '' : g('i_num').toUpperCase();
  const f = inc.fires.find(x => x.num === fireNum);
  if(f){ if(fireName) f.name = fireName; }
  else inc.fires.push({num:fireNum, name:fireName});
  inc.current = fireNum;
  S.incident = inc;
  save(); A.closeModal(); render();
};
A.incidentModal = () => {
  if(!S.incident){ A.setupIncident(true); return; }
  const inc = S.incident;
  const title = inc.type === 'single'
    ? 'Deployment'
    : esc(inc.name || INC_TYPES[inc.type]) + (inc.number ? ' <span class="muted" style="font-size:14px">' + esc(inc.number) + '</span>' : '');
  modal(`<h3>${title}</h3>
    <label>Fires this deployment — tap the one you're working now</label>
    ${inc.fires.map(f => `<button class="firechip ${f.num===inc.current?'cur':''}" onclick="A.switchFire('${esc(f.num)}')">
      🔥 ${esc(f.num)}${f.name ? ' <span style="font-weight:600;font-size:14px">— ' + esc(f.name) + '</span>' : ''} ${f.num===inc.current?'<small>WORKING</small>':''}</button>`).join('')}
    <div class="row" style="margin-top:6px">
      <input id="i_newfire" placeholder="Fire number…" autocapitalize="characters" style="text-transform:uppercase" oninput="A.fireSuggest(this,'i_newfirename')" autocomplete="off">
      <input id="i_newfirename" placeholder="Fire name…" style="flex:1.3">
      <button class="secondary" style="flex:0 0 78px" onclick="A.addFire()">＋ Add</button>
    </div>
    <div id="sg_i_newfire" class="suggest"></div>
    <p class="notice">Add a fire when your crews change work locations under the same ${inc.type==='mzoc'?'MZOC':'complex'}. Check-in rounds are stamped with whichever fire is active. Use <b>End deployment</b> (⚙︎ Settings) when you're done.</p>
    <div class="row" style="margin-top:10px">
      <button class="secondary" onclick="A.closeModal();A.setupIncident(false)">Edit details</button>
      <button class="primary" onclick="A.closeModal()">Done</button>
    </div>`);
};
/* ---- BCWS fire registry lookup (public ArcGIS feed, same source as the BC Wildfire map) ---- */
const BCWS_API = 'https://services6.arcgis.com/ubm4tcTYICKBpist/arcgis/rest/services/BCWS_ActiveFires_PublicView/FeatureServer/0/query';
const fireCache = {};
let fireDebounce = null, sgRows = [];
A.fireSuggest = (input, nameFieldId) => {
  const q = input.value.trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
  const box = document.getElementById('sg_' + input.id);
  if(!box) return;
  if(q.length < 2 || !navigator.onLine){ box.innerHTML = ''; return; }
  clearTimeout(fireDebounce);
  fireDebounce = setTimeout(async () => {
    try{
      let rows = fireCache[q];
      if(!rows){
        const url = BCWS_API + '?where=' + encodeURIComponent("FIRE_NUMBER LIKE '" + q + "%'") +
          '&outFields=FIRE_NUMBER,GEOGRAPHIC_DESCRIPTION,FIRE_STATUS,CURRENT_SIZE&resultRecordCount=8&f=json';
        const d = await (await fetch(url)).json();
        rows = (d.features || []).map(f => f.attributes);
        const rank = s => ({'Fire of Note':0, 'Out of Control':1, 'Being Held':2, 'Under Control':3}[s] ?? 4);
        rows.sort((a,b) => rank(a.FIRE_STATUS) - rank(b.FIRE_STATUS));
        fireCache[q] = rows;
      }
      const cur = input.value.trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
      if(cur !== q || !document.getElementById('sg_' + input.id)) return; // typed more / modal closed
      sgRows = rows.slice(0, 6);
      box.innerHTML = sgRows.map((r, i) =>
        `<div class="sgrow" onclick="A.pickFire('${input.id}','${nameFieldId}',${i})">
          <b>${esc(r.FIRE_NUMBER)}</b> ${esc(r.GEOGRAPHIC_DESCRIPTION || '')}
          <small>${esc(r.FIRE_STATUS || '')}${r.CURRENT_SIZE >= 1 ? ' · ' + Math.round(r.CURRENT_SIZE).toLocaleString() + ' ha' : ''} · BCWS map</small>
        </div>`).join('');
    }catch(err){ box.innerHTML = ''; }
  }, 300);
};
A.pickFire = (inputId, nameFieldId, i) => {
  const r = sgRows[i]; if(!r) return;
  document.getElementById(inputId).value = r.FIRE_NUMBER;
  const nf = document.getElementById(nameFieldId);
  if(nf) nf.value = r.GEOGRAPHIC_DESCRIPTION || '';
  const box = document.getElementById('sg_' + inputId); if(box) box.innerHTML = '';
};

A.switchFire = f => { S.incident.current = f; save(); render(); A.incidentModal(); };
A.addFire = () => {
  const num = document.getElementById('i_newfire').value.trim().toUpperCase();
  const name = document.getElementById('i_newfirename').value.trim();
  if(!num) return;
  const f = S.incident.fires.find(x => x.num === num);
  if(f){ if(name) f.name = name; }
  else S.incident.fires.push({num, name});
  S.incident.current = num;
  save(); render(); A.incidentModal();
};

/* ============ modal ============ */
function modal(html){
  const h = document.getElementById('modalhost');
  h.innerHTML = `<div class="modal-bg" onclick="if(event.target===this)A.closeModal()"><div class="modal">${html}</div></div>`;
  return h;
}
A.closeModal = () => { document.getElementById('modalhost').innerHTML = ''; };

/* ============ home / check-in ============ */
// Check-ins run on a fixed schedule: firstTime, then every intervalMin,
// so all crews check in at the same times each day.
function slotTimes(dayOffset){
  const [h,m] = (S.settings.firstTime || '08:00').split(':').map(Number);
  const iv = S.settings.intervalMin * 60000;
  const t0 = new Date(); t0.setDate(t0.getDate() + (dayOffset||0)); t0.setHours(h, m, 0, 0);
  const end = new Date(t0); end.setHours(23, 59, 59, 999);
  const out = [];
  for(let t = t0.getTime(); t <= end.getTime(); t += iv) out.push(new Date(t));
  return out;
}
function dueInfo(){
  const slots = slotTimes(0);
  if(!slots.length) return null;
  const today = dayKey();
  const lastToday = S.rounds.filter(r => dayKey(r.startedAt) === today)
    .map(r => new Date(r.startedAt).getTime()).sort((a,b) => a-b).pop();
  // a round covers a slot if it started no earlier than tol before it
  const tol = Math.min(30, S.settings.intervalMin / 2) * 60000;
  if(!S.rounds.length){
    // nothing recorded yet — point at the next upcoming slot, don't alarm
    const up = slots.find(s => s.getTime() >= Date.now());
    return up ? {dueAt: up, fresh: true} : {dueAt: slotTimes(1)[0], tomorrow: true};
  }
  const next = slots.find(s => !lastToday || s.getTime() > lastToday + tol);
  if(!next) return {dueAt: slotTimes(1)[0], tomorrow: true};
  return {dueAt: next, tomorrow: false};
}

A.startRound = () => { S.rounds.push({id:uid(), startedAt:now(), closedAt:null, checks:{}, fire:S.incident?.current || ''}); save(); render(); };
A.check = id => { const r = openRound(); if(!r) return; r.checks[id] = {time:now()};
  const e = ncFor(id); if(e){ e.contactAt = now(); } save(); render(); };
A.markMissed = id => { const r = openRound(); if(!r) return; r.checks[id] = {time:now(), missed:true}; ncCreate(id, r.id); save(); render(); };
A.uncheck = id => { const r = openRound(); if(!r) return; if(confirm('Clear this check-in?')){
  const ck = r.checks[id];
  if(ck && ck.missed){ const e = ncFor(id); if(e && e.roundId === r.id && !e.attempts.length && !e.escalatedAt) S.nocontact = S.nocontact.filter(x => x !== e); }
  delete r.checks[id]; save(); render(); } };
A.closeRound = () => {
  const r = openRound(); if(!r) return;
  const missing = activeCrews().filter(c => !r.checks[c.id]);
  if(missing.length && !confirm(missing.length+' crew(s) not checked in — close anyway? They will be logged as no-contact.')) return;
  missing.forEach(c => { r.checks[c.id] = {time:now(), missed:true}; ncCreate(c.id, r.id); });
  r.closedAt = now(); save(); render();
};

/* ---- no-contact tracking & reminders ---- */
const openNC = () => S.nocontact.filter(e => !e.contactAt && crewById(e.crewId));
const ncFor = crewId => openNC().find(e => e.crewId === crewId);
function ncCreate(crewId, roundId){
  if(ncFor(crewId)) return;
  S.nocontact.push({id:uid(), crewId, roundId, missedAt:now(), attempts:[], escalatedAt:null, contactAt:null,
    fire:S.incident?.current || ''});
  try{ if('Notification' in window && Notification.permission === 'default') Notification.requestPermission(); }catch(e){}
}
const ncLastActivity = e => [e.missedAt, ...e.attempts, e.escalatedAt].filter(Boolean).sort().pop();
const ncDue = e => Date.now() - new Date(ncLastActivity(e)).getTime() >= (S.settings.retryMin || 5) * 60000;
A.ncAttempt = id => { const e = S.nocontact.find(x => x.id === id); if(e){ e.attempts.push(now()); save(); render(); } };
A.ncContact = id => { const e = S.nocontact.find(x => x.id === id); if(e){ e.contactAt = now(); save(); render(); } };
A.ncEscalate = id => { const e = S.nocontact.find(x => x.id === id);
  if(e && confirm('Record that Fire Centre has been alerted to start looking for this crew?')){ e.escalatedAt = now(); save(); render(); } };
const ncAlerted = {};
function ncCheckAlerts(){
  openNC().forEach(e => {
    const key = e.id + ':' + ncLastActivity(e);
    if(ncDue(e) && !ncAlerted[key]){
      ncAlerted[key] = 1;
      try{ const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination); o.frequency.value = 880; g.gain.value = .25;
        o.start(); o.stop(ctx.currentTime + .5); }catch(err){}
      if(navigator.vibrate) navigator.vibrate([250, 120, 250]);
      try{ if('Notification' in window && Notification.permission === 'granted'){
        const c = crewById(e.crewId);
        new Notification('NO CONTACT: ' + (c ? (c.callsign ? c.callsign + ' ' : '') + c.name : 'crew'),
          {body:'Try them again — missed the ' + fmtT(e.missedAt) + ' check-in.', tag:e.id});
      } }catch(err){}
    }
  });
}
function ncCards(){
  const events = openNC();
  if(!events.length) return '';
  let html = `<h2 style="color:var(--red)">⚠ No contact (${events.length})</h2>`;
  events.forEach(e => {
    const c = crewById(e.crewId);
    const due = ncDue(e);
    const sinceMin = Math.round((Date.now() - new Date(ncLastActivity(e)).getTime())/60000);
    const waitMin = Math.max(0, (S.settings.retryMin || 5) - sinceMin);
    html += `<div class="card" style="border-color:var(--red);${due ? 'animation:pulse 1.6s infinite;' : ''}">
      <div style="font-weight:800;font-size:16.5px;color:var(--red)">📵 ${esc(c.callsign || '')} ${esc(c.name)}</div>
      <div class="muted" style="margin:5px 0 11px;line-height:1.5">Missed ${fmtT(e.missedAt)} check-in${e.fire ? ' · '+esc(e.fire) : ''}
        ${e.attempts.length ? `<br>Tried ${e.attempts.length}× — last attempt ${fmtT(e.attempts[e.attempts.length-1])}` : ''}
        ${e.escalatedAt ? `<br><b style="color:var(--amber)">🚨 Fire Centre alerted ${fmtT(e.escalatedAt)}</b>` : ''}
        <br>${due ? '<b style="color:var(--red)">Reminder: try them again now</b>' : 'Next reminder in ' + waitMin + ' min'}</div>
      <div class="row">
        <button class="secondary" onclick="A.ncAttempt('${e.id}')">🔁 No answer</button>
        <button class="secondary" style="color:var(--green);border-color:#2ecc7166" onclick="A.ncContact('${e.id}')">✓ Made contact</button>
      </div>
      ${e.escalatedAt ? '' : `<button class="secondary danger" style="margin-top:8px" onclick="A.ncEscalate('${e.id}')">🚨 Alert Fire Centre — start looking</button>`}
    </div>`;
  });
  return html;
}

/* ============ paperwork ============ */
// Missing 214/DTR items from the crew's first day through yesterday.
// 0 = up to date (green), 1 = behind (yellow), 2+ = red.
function paperMissing(c){
  const today = dayKey();
  const start = dayKey(c.createdAt || today);
  if(start >= today) return {n:0, days:0};
  const [y,m,d0] = start.split('-').map(Number);
  const d = new Date(y, m-1, d0);
  let n = 0, days = 0;
  while(dayKey(d) < today && days < 60){
    const rec = (S.paperwork[dayKey(d)] || {})[c.id] || {};
    if(!rec.p214) n++;
    if(!rec.dtr) n++;
    d.setDate(d.getDate()+1); days++;
  }
  return {n, days};
}
function paperView(){
  const crews = activeCrews();
  const pw = S.paperwork[paperDay] = S.paperwork[paperDay] || {};
  let html = `<div class="datenav">
    <button onclick="A.shiftDay(-1)">‹</button>
    <div class="d">${fmtDay(paperDay)}${paperDay===dayKey()?'<small>today</small>':'<small>&nbsp;</small>'}</div>
    <button onclick="A.shiftDay(1)">›</button>
  </div>`;
  if(!crews.length) return html + `<div class="empty">No active crews.</div>`;
  html += `<div class="card" style="padding:4px 12px">`;
  crews.forEach(c => {
    const rec = pw[c.id] || {};
    const miss = paperMissing(c);
    const col = miss.n === 0 ? 'var(--green)' : miss.n === 1 ? 'var(--amber)' : 'var(--red)';
    html += `<div class="paperrow">
      <div class="who"><b style="color:${col}">${esc(c.callsign||'')} ${esc(c.name)}</b>
        ${miss.n ? `<small style="display:block;color:${col}">${miss.n} missing from previous day${miss.days>1?'s':''}</small>` : ''}</div>
      <button class="pbtn ${rec.p214?'got':''}" onclick="A.togglePaper('${c.id}','p214')">${rec.p214 ? '✓ 214<br>'+fmtT(rec.p214) : 'ICS 214'}</button>
      <button class="pbtn ${rec.dtr?'got':''}" onclick="A.togglePaper('${c.id}','dtr')">${rec.dtr ? '✓ DTR<br>'+fmtT(rec.dtr) : 'DTR'}</button>
    </div>`;
  });
  html += `</div><p class="notice">Tap when a crew hands in their ICS 214 or DTR — time of receipt is recorded. Use ‹ › to record yesterday's paperwork handed in this morning.<br>
  Names: <b style="color:var(--green)">green</b> = up to date · <b style="color:var(--amber)">yellow</b> = 1 item outstanding · <b style="color:var(--red)">red</b> = 2+ outstanding from previous days.</p>`;
  return html;
}
A.shiftDay = n => { const [y,m,d] = paperDay.split('-').map(Number); paperDay = dayKey(new Date(y, m-1, d+n)); render(); };
A.togglePaper = (crewId, kind) => {
  const pw = S.paperwork[paperDay] = S.paperwork[paperDay] || {};
  const rec = pw[crewId] = pw[crewId] || {};
  if(rec[kind]){ if(confirm('Clear received-at '+fmtT(rec[kind])+'?')) rec[kind] = null; }
  else rec[kind] = now();
  save(); render();
};

function logView(){
  const rounds = [...S.rounds].sort((a,b) => b.startedAt.localeCompare(a.startedAt));
  let html = '', lastDay = '';
  const ncs = [...S.nocontact].sort((a,b) => b.missedAt.localeCompare(a.missedAt));
  if(ncs.length){
    html += `<h2 style="color:var(--red)">No-contact events (${ncs.length})</h2>`;
    ncs.forEach(e => {
      const c = crewById(e.crewId);
      html += `<div class="card" style="border-color:${e.contactAt ? 'var(--line)' : 'var(--red)'}">
        <b>📵 ${esc(c ? (c.callsign ? c.callsign + ' ' : '') + c.name : 'deleted crew')}</b>
        <span class="muted"> · ${fmtDay(dayKey(e.missedAt))}${e.fire ? ' · ' + esc(e.fire) : ''}</span>
        <div class="muted" style="margin-top:6px;line-height:1.6">Missed check-in ${fmtT(e.missedAt)}
          ${e.attempts.map(a => `<br>🔁 Attempted ${fmtT(a)} — no answer`).join('')}
          ${e.escalatedAt ? `<br><b style="color:var(--amber)">🚨 Fire Centre alerted ${fmtT(e.escalatedAt)}</b>` : ''}
          ${e.contactAt ? `<br><b style="color:var(--green)">✓ Contact re-established ${fmtT(e.contactAt)}</b>` : '<br><b style="color:var(--red)">Still unreached</b>'}</div>
      </div>`;
    });
  }
  if(!rounds.length) return html + `<div class="empty">No check-in rounds yet.<br>Start one from the Check-In tab.</div>`;
  rounds.forEach(r => {
    const d = dayKey(r.startedAt);
    if(d !== lastDay){ html += `<h2>${fmtDay(d)}</h2>`; lastDay = d; }
    const entries = Object.entries(r.checks);
    html += `<div class="card logday" style="padding:8px 4px">
      <div style="padding:4px 12px 8px;font-weight:700">Round ${fmtT(r.startedAt)}${r.closedAt ? ' – '+fmtT(r.closedAt) : ' <span class="pill a">open</span>'}${r.fire ? ' <span class="muted" style="font-weight:600">· 🔥 '+esc(r.fire)+'</span>' : ''}</div>`;
    if(!entries.length) html += `<div class="muted" style="padding:0 12px 8px">No crews checked.</div>`;
    entries.sort((a,b) => (a[1].time||'').localeCompare(b[1].time||'')).forEach(([cid, ck]) => {
      const c = crewById(cid);
      html += `<div class="logline"><span class="t">${fmtT(ck.time)}</span>
        <span>${esc(c ? (c.callsign?c.callsign+' ':'')+c.name : 'deleted crew')}</span>
        ${ck.missed ? '<span class="pill r">no contact</span>' : '<span class="pill g">✓</span>'}</div>`;
    });
    html += `</div>`;
  });
  return html;
}

  a.download = 'deployment-' + (inc.current || inc.number || 'report').replace(/[^\w-]/g, '') + '-' + dayKey() + '.html';
  a.click(); setTimeout(() => URL.revokeObjectURL(a.href), 5000);
};
A.wipe = () => {
  if(confirm('Clear ALL deployment data on this device? Make sure the report is saved.') && confirm('Really sure?')){
    const dir = S.directory; // keep the contact directory across deployments
    S = blank(); S.directory = dir;
    save(); A.closeModal(); A.go('home'); A.setupIncident(true);
  }
};
document.getElementById('importfile').onchange = e => {
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => { try{
      const d = JSON.parse(r.result);
      if(Array.isArray(d.directory) && !Array.isArray(d.crews)){
        // contact-directory file: replace the reference list (updated rosters swap in
        // cleanly); deployment data is untouched
        S.directory = d.directory.filter(p => p && p.name)
          .map(p => ({name:p.name, phone:p.phone||'', group:p.group||'', callsign:p.callsign||'', dept:p.dept||''}));
        save(); render(); alert('Directory loaded — '+S.directory.length+' contacts. Use "From directory" under Crews → Overhead.');
        return;
      }
      if(!Array.isArray(d.crews)) throw 0;
      S = Object.assign(blank(), d);
      S.settings = Object.assign(blank().settings, d.settings || {});
      S.leaders = d.leaders || []; S.directory = d.directory || [];
      save(); A.go('home'); alert('Backup restored — '+S.crews.length+' crews.');
    }catch(err){ alert('Not a valid SPS Deploy backup or directory file.'); } };
  r.readAsText(f); e.target.value = '';
};

/* ============ T-Card scan ============ */
let scanTarget = null; // null = new crews, crewId = attach photo only
A.scanTC = () => { scanTarget = null; document.getElementById('tcfile').click(); };
A.attachPhoto = id => { scanTarget = id; document.getElementById('tcfile').click(); };
document.getElementById('tcfile').onchange = async e => {
  const f = e.target.files[0]; e.target.value = '';
  if(!f) return;
  const {full, thumb} = await downscale(f);
  if(scanTarget){ const c = crewById(scanTarget); if(c){ c.photo = thumb; save(); render(); } return; }
  if(S.settings.apiKey && navigator.onLine){
    modal(`<h3>Reading T-Card…</h3><img class="tcphoto" src="${thumb}"><p class="muted"><span class="spin"></span> Sending photo to Claude…</p>`);
    try{
      const crews = await parseTCard(full);
      if(!crews.length) throw new Error('No crews found on the card');
      showScanReview(crews, thumb);
    }catch(err){
      modal(`<h3>Couldn't auto-read the card</h3><p class="muted">${esc(err.message||err)}</p>
        <button class="primary" style="margin-top:12px" onclick='A.closeModal();A.addCrewModal({photo:window._scanThumb})'>Add crew manually (photo attached)</button>
        <button class="secondary" style="margin-top:8px" onclick="A.closeModal()">Cancel</button>`);
      window._scanThumb = thumb;
    }
  } else {
    window._scanThumb = thumb;
    A.addCrewModal({photo:thumb});
    if(!S.settings.apiKey){
      const el = document.querySelector('.modal h3');
      if(el) el.insertAdjacentHTML('afterend', `<p class="notice" style="margin:0 0 8px">Tip: add an API key in ⚙︎ Settings and scans fill this in automatically.</p>`);
    }
  }
};
function downscale(file){
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => {
      const make = (max, q) => {
        const sc = Math.min(1, max / Math.max(img.width, img.height));
        const cv = document.createElement('canvas');
        cv.width = Math.round(img.width * sc); cv.height = Math.round(img.height * sc);
        cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
        return cv.toDataURL('image/jpeg', q);
      };
      res({full: make(1568, .85), thumb: make(640, .7)});
      URL.revokeObjectURL(img.src);
    };
    img.onerror = () => rej(new Error('Could not read image'));
    img.src = URL.createObjectURL(file);
  });
}
async function parseTCard(dataUrl){
  const b64 = dataUrl.split(',')[1];
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'x-api-key':S.settings.apiKey, 'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true', 'content-type':'application/json'},
    body: JSON.stringify({model:'claude-sonnet-5', max_tokens:2000, messages:[{role:'user', content:[
      {type:'image', source:{type:'base64', media_type:'image/jpeg', data:b64}},
      {type:'text', text:'This photo shows one or more wildfire resource T-Cards (BCWS/ICS style), possibly handwritten. Extract every crew/resource card visible. Reply with ONLY a JSON array, no other text: [{"name":"crew or resource name","callsign":"callsign or resource ID if shown","leader":"crew leader/boss name if shown","phone":"leader phone if shown","channel":"radio channel if shown","members":[{"name":"","role":"","phone":""}]}]. Use "" for anything not legible or not present. Do not invent data.'}
    ]}]})
  });
  if(!resp.ok){
    const t = await resp.text();
    let msg = 'API error ' + resp.status;
    try{ msg = JSON.parse(t).error?.message || msg; }catch(e){}
    throw new Error(msg);
  }
  const data = await resp.json();
  const text = (data.content||[]).map(b => b.text||'').join('');
  const m = text.match(/\[[\s\S]*\]/);
  if(!m) throw new Error('Could not read any crew details from the photo');
  const arr = JSON.parse(m[0]);
  return arr.filter(c => c && (c.name || c.callsign));
}
function showScanReview(crews, thumb){
  window._scanCrews = crews; window._scanThumb = thumb;
  modal(`<h3>Found ${crews.length} crew${crews.length>1?'s':''} on the card</h3>
    <img class="tcphoto" src="${thumb}">
    ${crews.map((c,i) => `<label style="display:flex;align-items:center;gap:10px;text-transform:none;font-size:15px;color:var(--text);background:var(--card2);border:1px solid var(--line);border-radius:11px;padding:11px;margin:0 0 8px">
      <input type="checkbox" id="sc_${i}" checked style="width:22px;height:22px;flex-shrink:0">
      <span><b>${esc(c.callsign?c.callsign+' — ':'')}${esc(c.name||'(unnamed)')}</b><br>
      <small class="muted">${esc(c.leader?'CL: '+c.leader:'')}${c.members?.length?' · '+c.members.length+' members':''}</small></span>
    </label>`).join('')}
    <div class="row" style="margin-top:14px">
      <button class="secondary" onclick="A.closeModal()">Cancel</button>
      <button class="primary" onclick="A.importScanned()">Add selected</button>
    </div>
    <p class="notice">Check names against the card — handwriting reads can be imperfect. Everything stays editable.</p>`);
}
A.importScanned = () => {
  let added = 0;
  (window._scanCrews||[]).forEach((c, i) => {
    if(!document.getElementById('sc_'+i)?.checked) return;
    const crew = {id:uid(), name:c.name||c.callsign||'Crew', callsign:c.callsign||'', channel:c.channel||'',
      leader:c.leader||'', notes:'', archived:false, createdAt:now(),
      photo:added===0 ? window._scanThumb : null,
      members:(c.members||[]).filter(m => m && m.name).map(m => ({id:uid(), name:m.name, role:m.role||'', phone:m.phone||'', notes:''}))};
    if(crew.leader && c.phone && !crew.members.some(m => m.name.toLowerCase() === crew.leader.toLowerCase()))
      crew.members.unshift({id:uid(), name:crew.leader, role:'Crew Leader', phone:c.phone, notes:''});
    S.crews.push(crew); added++;
  });
  save(); A.closeModal(); A.go('crews');
};

/* ============ render ============ */
function render(){
  const v = document.getElementById('view');
  if(route.tab === 'home') v.innerHTML = homeView();
  else if(route.tab === 'crews') v.innerHTML = crewsView();
  else if(route.tab === 'crew') v.innerHTML = crewView(route.crewId);
  else if(route.tab === 'paper') v.innerHTML = paperView();
  else if(route.tab === 'log') v.innerHTML = logView();
  else if(route.tab === 'settings') v.innerHTML = settingsView();
  if(route.tab !== 'home' && openNC().length){
    const names = openNC().map(e => { const c = crewById(e.crewId); return c ? (c.callsign || c.name) : ''; }).filter(Boolean).join(', ');
    v.innerHTML = `<div class="banner due" style="cursor:pointer" onclick="A.go('home')">📵 NO CONTACT: ${esc(names)} — tap for actions</div>` + v.innerHTML;
  }
  const fp = document.getElementById('firepill');
  fp.textContent = firePillText();
  fp.style.opacity = S.incident ? '1' : '.75';
  renderNav();
}
setInterval(() => {
  ncCheckAlerts();
  if(route.tab === 'home' && !document.getElementById('modalhost').innerHTML) render();
}, 20000);
const setOnline = () => document.body.classList.toggle('offline', !navigator.onLine);
addEventListener('online', setOnline); addEventListener('offline', setOnline); setOnline();
render();
if(!S.incident) A.setupIncident(true);
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
