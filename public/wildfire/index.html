<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BC Wildfire — Deployment Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #f3eee5; min-height: 100vh; }
  .fade { min-height: 100vh; animation: fade .26s ease both; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  /* Leaflet tooltip overrides */
  .fire-tooltip { background: rgba(12,10,8,.85) !important; color: #fff !important; border: 1px solid rgba(255,255,255,.2) !important; font: 700 12px 'Archivo', sans-serif !important; padding: 4px 10px !important; border-radius: 6px !important; box-shadow: 0 2px 8px rgba(0,0,0,.4) !important; }
  .fire-tooltip::before { border-bottom-color: rgba(12,10,8,.85) !important; }
  .base-tooltip { background: rgba(91,141,239,.9) !important; color: #fff !important; border: none !important; font: 600 11px 'Archivo', sans-serif !important; padding: 3px 8px !important; border-radius: 5px !important; }
  .base-tooltip::before { border-bottom-color: rgba(91,141,239,.9) !important; }
  .comm-tooltip { background: rgba(40,30,20,.8) !important; color: #e8902f !important; border: 1px solid rgba(232,144,47,.3) !important; font: 600 10px 'Archivo', sans-serif !important; padding: 3px 7px !important; border-radius: 5px !important; }
  .comm-tooltip::before { border-top-color: rgba(40,30,20,.8) !important; }
  .leaflet-control-zoom a { background: rgba(12,10,8,.75) !important; color: #fff !important; border-color: rgba(255,255,255,.15) !important; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script src="data.js?v=100"></script>
<script src="data-detail.js?v=100"></script>
<script type="text/babel" src="system.jsx?v=100"></script>
<script type="text/babel" src="direction-c.jsx?v=100"></script>
<script type="text/babel" src="briefer-card.jsx?v=100"></script>
<script type="text/babel" src="briefing.jsx?v=100"></script>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

function App() {
  const [fireId, setFireId] = useState(null);
  const [, setTick] = useState(0);
  const open = (id) => { setFireId(id); localStorage.setItem('wf-fire', id); window.scrollTo(0, 0); };
  const back = () => { setFireId(null); localStorage.removeItem('wf-fire'); window.scrollTo(0, 0); };

  // Load live data and wire up re-render callback
  useEffect(() => {
    window._wfRerender = () => setTick(t => t + 1);
    if (window.WF && window.WF.loadLiveData) window.WF.loadLiveData();
    return () => { window._wfRerender = null; };
  }, []);

  // Show fire briefing only if the fire exists in current data
  const showFire = fireId && window.WF && window.WF.finder(fireId);

  return showFire
    ? <div className="fade" key={fireId}><FireBriefing fireId={fireId} onBack={back} /></div>
    : <div className="fade"><DirC onOpen={open} /></div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
